<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="glass">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fondo glass -->
  <rect x="15" y="15" width="70" height="70" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" filter="url(#glass)"/>
  
  <!-- Línea de tendencia ascendente minimalista -->
  <polyline points="25,65 40,50 55,55 70,35" 
            fill="none" 
            stroke="rgba(255,255,255,0.7)" 
            stroke-width="2" 
            stroke-linecap="round" 
            stroke-linejoin="round"/>
  
  <!-- Barra minimalista -->
  <rect x="25" y="70" width="6" height="15" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="40" y="55" width="6" height="30" rx="1" fill="rgba(255,255,255,0.5)"/>
  <rect x="55" y="60" width="6" height="25" rx="1" fill="rgba(255,255,255,0.4)"/>
  <rect x="70" y="40" width="6" height="45" rx="1" fill="rgba(255,255,255,0.6)"/>
  
  <!-- Punto final minimalista -->
  <circle cx="70" cy="35" r="2.5" fill="rgba(255,255,255,0.9)"/>
</svg>