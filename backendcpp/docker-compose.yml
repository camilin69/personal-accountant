services:
  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile.alpine
    container_name: auth
    restart: always
    ports:
      - "8081:8081"
    environment:
      # Kafka
      KAFKA_BROKER: kafka:9092
      # PostgreSQL
      POSTGRES_HOST: postgresdb
      POSTGRES_PORT: 5432
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: yung_accountant
      POSTGRES_SSL_MODE: disable
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis123
      # Servidor
      SERVER_PORT: 8081
      # Keycloak
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: yung-accountant
    networks:
      - shared-network

  category:
    build:
      context: ./category
      dockerfile: Dockerfile.alpine
    container_name: category
    restart: always
    ports:
      - "8082:8082"
    environment:
      # Kafka
      KAFKA_BROKER: kafka:9092
      # PostgreSQL
      POSTGRES_HOST: postgresdb
      POSTGRES_PORT: 5432
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: yung_accountant
      POSTGRES_SSL_MODE: disable
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis123
      # Servidor
      SERVER_PORT: 8082
      # Keycloak
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: yung-accountant
      # Secrets de clientes (para verificación de tokens)
      CLIENT_ALCALDIA_DUITAMA_SECRET: duitama-secret-2024
      CLIENT_ALCALDIA_SOGAMOSO_SECRET: sogamoso-secret-2024
      CLIENT_ALCALDIA_TUNJA_SECRET: tunja-secret-2024
    networks:
      - shared-network

networks:
  shared-network:
    external: true